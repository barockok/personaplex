services:
  worker-1:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8998:8998"
    environment:
      - NO_TORCH_COMPILE=1
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ./.cache:/root/.cache
    command:
      - /app/moshi/.venv/bin/python
      - -m
      - moshi.server
      - --ssl
      - /app/ssl
      - --host
      - "0.0.0.0"
      - --max-sessions
      - "3"
      - --worker-id
      - worker-1

  worker-2:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8999:8998"
    environment:
      - NO_TORCH_COMPILE=1
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ./.cache:/root/.cache
    command:
      - /app/moshi/.venv/bin/python
      - -m
      - moshi.server
      - --ssl
      - /app/ssl
      - --host
      - "0.0.0.0"
      - --max-sessions
      - "3"
      - --worker-id
      - worker-2

  router:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    depends_on:
      - worker-1
      - worker-2
    command:
      - /app/moshi/.venv/bin/python
      - -m
      - moshi.router
      - --host
      - "0.0.0.0"
      - --port
      - "9000"
      - --workers
      - worker-1:worker-1:8998
      - --workers
      - worker-2:worker-2:8998
      - --health-check-interval
      - "10"
